name: Bug Report
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting! Please fill in as much detail as possible.

  - type: input
    id: odoo-version
    attributes:
      label: Odoo Version
      description: Which Odoo version are you running?
      placeholder: "19.0"
    validations:
      required: true

  - type: input
    id: module-version
    attributes:
      label: Module Version
      description: Check __manifest__.py for the version
      placeholder: "1.0.0"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear description of what the bug is
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Step-by-step instructions to reproduce the issue
      value: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened

  - type: textarea
    id: logs
    attributes:
      label: Error Logs
      description: Paste relevant Odoo server logs or browser console errors
      render: shell

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots

  - type: dropdown
    id: browsers
    attributes:
      label: Browser (if UI issue)
      multiple: true
      options:
        - Chrome
        - Firefox
        - Safari
        - Edge
        - Other
